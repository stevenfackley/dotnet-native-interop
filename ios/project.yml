name: DotnetNativeInteropApp
options:
  bundleIdPrefix: com.dotnetnativeinterop
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug

# First Swift Package Manager dependency in the project (Wave B Plan B gate): the SwiftProtobuf runtime
# that the generated Shared/Pb/dni_frame.pb.swift links against. protoc-gen-swift generates the message
# types; this pulls the matching runtime. Pinned to track the codegen plugin (1.38.x).
packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.38.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete
    FRAMEWORK_SEARCH_PATHS: $(SRCROOT)/Frameworks
    LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"

targets:
  # The one app: all three transports (FFI / HTTP / SQLCipher) with a picker + Compare tab.
  # SQLite data crosses as JSON from the native lib (which owns the SQLCipher key), so no
  # Swift SQLite dependency is needed.
  DotnetNativeInteropUnified:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
      - path: Apps/Unified
      # Bundle the all-MiniLM model + vocab + fact corpus as a folder reference so the app ships
      # <App>.app/assets/{model.onnx,vocab.txt,corpus.txt}; the engine resolves them at runtime.
      - path: ../core/DotnetNativeInterop.Engine/Ai/assets
        type: folder
        buildPhase: resources
      # EVS: the prebuilt SQLite vector index + the cross-runtime agreement fixtures.
      - path: ../core/DotnetNativeInterop.EdgeIndexPublisher/edge-index.db
        buildPhase: resources
      - path: ../core/DotnetNativeInterop.EdgeIndexPublisher/edge-fixtures.json
        buildPhase: resources
    dependencies:
      - framework: Frameworks/dni.xcframework
        embed: true
        codeSign: true
      - framework: Frameworks/onnxruntime.xcframework
        embed: true
        codeSign: true
      - package: SwiftProtobuf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dotnetnativeinterop.unified
        INFOPLIST_KEY_CFBundleDisplayName: "C# Features"
        INFOPLIST_FILE: Apps/Unified/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: Apps/Unified/BridgingHeader.h
        DEVELOPMENT_TEAM: ""  # Pass DEVELOPMENT_TEAM=… on the xcodebuild command line.
        # ONNX Runtime's iOS framework is a static C++ library; link libc++ so its std:: symbols resolve.
        OTHER_LDFLAGS: "-lc++"

  # UI-test target that navigates every screen and captures a screenshot of each (run on a Simulator,
  # no signing needed). Drives the populating actions so charts/benchmarks/telemetry aren't empty.
  DotnetNativeInteropScreenshots:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ScreenshotTests
    dependencies:
      - target: DotnetNativeInteropUnified
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dotnetnativeinterop.screenshots
        TEST_TARGET_NAME: DotnetNativeInteropUnified
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

  # Unit tests hosted in the app: the EVS Core ML linkage gate (EdgeSearchSpikeTests) and the
  # Swift/.NET cross-runtime agreement tests (EdgeSearchAgreementTests). Runs on a Simulator.
  DotnetNativeInteropTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: DotnetNativeInteropUnified
      - package: SwiftProtobuf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dotnetnativeinterop.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: Tests/TestsBridging.h
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DotnetNativeInteropUnified.app/DotnetNativeInteropUnified"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  DotnetNativeInteropUnified:
    build:
      targets:
        DotnetNativeInteropUnified: all
        DotnetNativeInteropScreenshots: [test]
        DotnetNativeInteropTests: [test]
    test:
      targets:
        - DotnetNativeInteropScreenshots
        - DotnetNativeInteropTests
