syntax = "proto3";

package dni.v1;

option csharp_namespace = "DotnetNativeInterop.NativeBridge.Grpc";

// Pattern 2 — gRPC over a Unix Domain Socket inside the app sandbox.
// Server-streaming mirrors the token stream shared by every transport.
service Inference {
  rpc Infer (InferRequest) returns (stream InferToken);
}

message InferRequest {
  string prompt = 1;
  int32 max_tokens = 2;
  float temperature = 3;
}

message InferToken {
  int32 index = 1;
  string text = 2;
  bool final = 3;
}
