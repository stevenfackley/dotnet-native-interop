name: ci-ios

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
      - 'native/llama-shim/**'
      - 'ios/**'
      - 'build/build-ios-framework.sh'
      - '.github/workflows/ci-ios.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
      - 'native/llama-shim/**'
      - 'ios/**'
      - 'build/build-ios-framework.sh'
      - '.github/workflows/ci-ios.yml'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    # macos-latest ships Xcode 16.4 (the NativeAOT dni.dylib links cleanly here; macos-14's Xcode 15.4
    # regresses it with "Undefined symbols for arm64"). The runner is Intel, but the app build below is
    # forced to arm64 so it matches the arm64 simulator slices (dni iossimulator-arm64, onnxruntime).
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true   # onnxruntime.xcframework binary is Git-LFS; without this CI gets the pointer file

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      # macos-latest's DEFAULT xcode-select drifts (it was Xcode 26.5 through 2026-07-12 01:15 UTC, then
      # rolled back to Xcode 16.4 / iPhoneOS 18.5 SDK). The pb PQ channel
      # (ios/Shared/Pb/PqHandshakeClient.swift) uses CryptoKit MLKEM768/MLDSA65, which exist ONLY in the
      # iOS 26 SDK — under 16.4 the app build fails with "cannot find 'MLKEM768' in scope". Pin the newest
      # installed Xcode 26.x explicitly so the SDK is deterministic. Fails loudly if the runner has no
      # Xcode 26 at all (which would instead require #available/canImport compile gating on the PQ code).
      - name: Select Xcode with the iOS 26 SDK (post-quantum CryptoKit)
        run: |
          ls -d /Applications/Xcode_*.app || true
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "::error::no Xcode 26.x on this runner — iOS 26 SDK required for MLKEM768/MLDSA65"; exit 1
          fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Build llama.cpp static libs (device + simulator)
        run: |
          # The .csproj hand-links the iOS llama/ggml archives into the NativeAOT image, so they must
          # exist before build-ios-framework.sh publishes. Locally these are prebuilt on the Mac; CI
          # builds them here (macos-latest ships cmake + Xcode). build-ios-framework.sh is unchanged.
          chmod +x ./native/llama-shim/build-llama.sh
          ./native/llama-shim/build-llama.sh ios-arm64
          ./native/llama-shim/build-llama.sh iossimulator-arm64

      - name: Build iOS Framework (device + simulator)
        run: |
          chmod +x ./build/build-ios-framework.sh
          ./build/build-ios-framework.sh

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate

      - name: Build iOS app (simulator)
        run: |
          cd ios   # xcodegen generated the .xcodeproj here; each run step resets to the repo root
          # Force arm64: the dni + onnxruntime simulator slices are arm64-only, so build (cross-compile)
          # for arm64 even on this Intel runner — a compile/link check, not an execution.
          xcodebuild \
            -scheme DotnetNativeInteropUnified \
            -sdk iphonesimulator \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Upload XCFramework artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dni-xcframework
          path: ios/Frameworks/dni.xcframework
