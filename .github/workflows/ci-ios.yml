name: ci-ios

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'core/DotnetNativeInterop.NativeBridge/**'
      - 'ios/**'
      - 'build/build-ios-framework.sh'
      - '.github/workflows/ci-ios.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'core/DotnetNativeInterop.NativeBridge/**'
      - 'ios/**'
      - 'build/build-ios-framework.sh'
      - '.github/workflows/ci-ios.yml'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Build llama.cpp static libs (device + simulator)
        run: |
          # The .csproj hand-links the iOS llama/ggml archives into the NativeAOT image, so they must
          # exist before build-ios-framework.sh publishes. Locally these are prebuilt on the Mac; CI
          # builds them here (macos-latest ships cmake + Xcode). build-ios-framework.sh is unchanged.
          chmod +x ./native/llama-shim/build-llama.sh
          ./native/llama-shim/build-llama.sh ios-arm64
          ./native/llama-shim/build-llama.sh iossimulator-arm64

      - name: Build iOS Framework (device + simulator)
        run: |
          chmod +x ./build/build-ios-framework.sh
          ./build/build-ios-framework.sh

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate

      - name: Build iOS app (simulator)
        run: |
          cd ios   # xcodegen generated the .xcodeproj here; each run step resets to the repo root
          xcodebuild \
            -scheme DotnetNativeInteropUnified \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Upload XCFramework artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dni-xcframework
          path: ios/Frameworks/dni.xcframework
