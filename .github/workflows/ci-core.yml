name: ci-core

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore DotnetNativeInterop.slnx

      - name: Build
        run: dotnet build DotnetNativeInterop.slnx -c Release --no-restore

      - name: Test
        run: dotnet test DotnetNativeInterop.slnx -c Release --no-build --verbosity normal
        continue-on-error: true
