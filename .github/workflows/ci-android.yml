name: ci-android

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
      - 'native/llama-shim/**'
      - 'android/**'
      - 'build/build-android-so.sh'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
      - 'native/llama-shim/**'
      - 'android/**'
      - 'build/build-android-so.sh'
      - '.github/workflows/ci-android.yml'

env:
  DOTNET_VERSION: '10.0.x'
  JAVA_VERSION: '17'
  NDK_VERSION: '27.2.12479018'

# Build-only verification of the SP0 native gate: it proves the complete .NET 10 NativeAOT
# linux-bionic-arm64 image (FFI ABI + hand-linked llama/ggml + bundled SQLCipher) links and the
# Android app assembles. The on-device proof — the NativeGateTest instrumented suite (S1 FFI ABI,
# S2 SQLCipher, S3 llama generation) — runs on a real arm64 emulator locally; an arm64 emulator is
# impractical on x86_64/macOS CI runners, so it is intentionally not executed here.
jobs:
  build:
    runs-on: macos-latest   # ships cmake (for the NDK llama build) and the NDK darwin prebuilt
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true   # the AI model (model.onnx) is Git-LFS; copyAiAssets needs the real file

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          yes | sdkmanager "ndk;${{ env.NDK_VERSION }}" >/dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Build the native gate library (NativeAOT bionic + llama + SQLCipher)
        run: |
          # WITH_LLAMA defaults to 1: builds the android-arm64 llama/ggml static libs (cmake + NDK),
          # publishes libdni.so, and extracts libe_sqlcipher.so into jniLibs.
          chmod +x ./build/build-android-so.sh ./native/llama-shim/build-llama.sh
          ./build/build-android-so.sh

      - name: Build Android app (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/
